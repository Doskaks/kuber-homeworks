apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-with-init
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      initContainers:
      - name: wait-for-service
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          echo "Init: Waiting for service nginx-service..."
          while true; do
            if nslookup nginx-service 2>/dev/null | grep -q "Address"; then
              echo "Init: Service found! Starting main container..."
              exit 0
            fi
            echo "Init: Service not found, waiting..."
            sleep 3
          done
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80